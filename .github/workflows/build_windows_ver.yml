name: Test GitHub Release Pipeline

on:
  workflow_dispatch: # Cho phép bạn nhấn nút "Run workflow" trên giao diện GitHub Web để chạy ngay lập tức

permissions:
  contents: write # Cấp quyền ghi bắt buộc để tạo trang Release

jobs:
  # GIAI ĐOẠN 1: Giả lập tạo file sản phẩm cực nhanh (Mất 10 giây thay vì 2 tiếng)
  mock-build:
    name: Mock Build for ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - { env: "windows", file: "servo.exe" }
          - { env: "macos", file: "servo" }
          - { env: "linux", file: "servo" }
          - { env: "ohos", file: "libservoshell.so" }
          - { env: "android", file: "libservo.so" }
          - { env: "ios", file: "libservo.a" }
    steps:
      - name: Create Fake Binary File
        run: |
          mkdir -p ./output/
          echo "Mock binary data for ${{ matrix.platform.env }}" > ./output/${{ matrix.platform.file }}

      - name: Save Artifact Temporarily
        uses: actions/upload-artifact@v4
        with:
          name: servo-build-${{ matrix.platform.env }}
          path: ./output/${{ matrix.platform.file }}

  # GIAI ĐOẠN 2: Gom file và đẩy lên Release (Kiểm tra xem bước này có bị "Error 1" nữa không)
  publish-release:
    name: Test Publish All Binaries
    needs: mock-build
    runs-on: ubuntu-latest
    steps:
      - name: Create Isolated Output Workspace
        run: mkdir -p $GITHUB_WORKSPACE/release-artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-windows, path: ./release-artifacts/windows }

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-macos, path: ./release-artifacts/macos }

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-linux, path: ./release-artifacts/linux }

      - name: Download OpenHarmony Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-ohos, path: ./release-artifacts/ohos }

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-android, path: ./release-artifacts/android }

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with: { name: servo-build-ios, path: ./release-artifacts/ios }

      - name: Organize Files for Upload
        run: |
          mv ./release-artifacts/windows/servo.exe ./servo-windows-x64.exe || true
          mv ./release-artifacts/macos/servo ./servo-mac-arm64 || true
          mv ./release-artifacts/linux/servo ./servo-linux-x64 || true
          mv ./release-artifacts/ohos/libservoshell.so ./servo-openharmony-aarch64.so || true
          mv ./release-artifacts/android/libservo.so ./servo-android-aarch64.so || true
          mv ./release-artifacts/ios/libservo.a ./servo-ios-universal.a || true

      - name: Create Clean Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-release-${{ github.run_number }}
          name: Test Servo Multi-Platform Release #${{ github.run_number }}
          body: |
            Đây là bản build thử nghiệm hệ thống phát hành tự động (Release Pipeline).
            Nếu bạn nhìn thấy đủ 6 file ở dưới, hệ thống của bạn đã cấu hình hoàn chỉnh thành công!
          draft: false
          prerelease: true
          files: |
            servo-windows-x64.exe
            servo-mac-arm64
            servo-linux-x64
            servo-openharmony-aarch64.so
            servo-android-aarch64.so
            servo-ios-universal.a
