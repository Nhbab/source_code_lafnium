    # 10. Tự động gom và đăng tải tất cả lên cùng 1 trang Release duy nhất
    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: mega-nightly-${{ github.run_number }}
        name: Servo Mega Build (6 Platforms) #${{ github.run_number }}
        body: |
          Automated daily compilation of the latest Servo browser engine source code.
          All 6 major platforms built simultaneously using parallel virtual clusters.
        draft: false
        prerelease: true
        files: ${{ steps.locate.outputs.artifact_path }}
