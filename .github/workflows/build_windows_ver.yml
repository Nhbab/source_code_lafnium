name: "Servo Mega Multi Platform Build"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-code:
    name: "Sync Source with Upstream Servo"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Local Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Fetch and Merge Upstream Servo"
        run: |
          git config --global --add safe.directory "*"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git remote add upstream https://github.com || true
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X ours -m "Automated sync" || echo "Merged"

      - name: "Push Code Safely"
        run: |
          git config --global --add safe.directory "*"
          git push origin HEAD:${{ github.ref_name }} || echo "Already up to date"

  build:
    name: "Build for ${{ matrix.p.name }}"
    needs: sync-code
    runs-on: ${{ matrix.p.os }}
    strategy:
      fail-fast: false
      matrix:
        p:
          - { name: "Windows-Desktop", os: "windows-latest", env: "windows", run: "python mach build --release" }
          - { name: "macOS-Desktop", os: "macos-latest", env: "macos", run: "python3 ./mach build --release" }
          - { name: "Linux-Desktop", os: "ubuntu-latest", env: "linux", run: "python3 ./mach build --release" }
          - { name: "OpenHarmony-ARM64", os: "ubuntu-latest", env: "ohos", run: "python3 ./mach build --release --target aarch64-unknown-linux-ohos" }
          - { name: "Android-APK", os: "ubuntu-latest", env: "android", run: "python3 ./mach build --release --android" }
          - { name: "iOS-Framework", os: "macos-latest", env: "ios", run: "python3 ./mach build --release --ios" }

    steps:
      - name: "Free Disk Space (Windows Host)"
        if: matrix.p.os == 'windows-latest'
        shell: powershell
        run: |
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Microsoft\AndroidNDK" -ErrorAction SilentlyContinue

      - name: "Free Disk Space (Linux & macOS Hosts)"
        if: matrix.p.os != 'windows-latest'
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          elif [ "$RUNNER_OS" == "macOS" ]; then
            rm -rf /Users/runner/Library/Android/sdk /opt/hostedtoolcache/CodeQL
          fi

      - name: "Checkout Code Workspace"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Install System Environment Core (Windows Host)"
        if: matrix.p.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: "Install System Environment Core (macOS Hosts)"
        if: matrix.p.os == 'macos-latest'
        run: brew install automake pkg-config cmake ninja autoconf

      - name: "Install System Environment Core (Linux Hosts)"
        if: matrix.p.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl python3-pip libx11-dev libgl1-mesa-dev \
            libosmesa6-dev libfontconfig1-dev libssl-dev pkg-config

      - name: "Setup Python Runtime Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: "Install Base Python Modules"
        run: |
          pip install uv
          pip install packaging

      - name: "Inject Rust Compilers Toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-pc-windows-msvc
            aarch64-unknown-linux-ohos
            aarch64-linux-android
            armv7-linux-androideabi
            aarch64-apple-ios
            x86_64-apple-ios

      - name: "Configure Action Cache Engine"
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "servo-production-cache-${{ matrix.p.env }}"

      - name: "Install OpenHarmony Native Toolchain NDK"
        if: matrix.p.env == 'ohos'
        run: |
          mkdir -p $HOME/ohos-sdk
          curl -L -o ohos-sdk.linux.tgz https://harmonyos.com
          tar -xzf ohos-sdk.linux.tgz -C $HOME/ohos-sdk
          echo "OHOS_SDK_NATIVE=$(find $HOME/ohos-sdk -type d -name "native" | head -n 1)" >> $GITHUB_ENV

      - name: "Install Android Native Toolchain NDK"
        if: matrix.p.env == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      # --- REMOVED THE BREAKING SHELL: MATRIX STATEMENTS ---
      - name: "Bootstrap Environment (Windows)"
        if: matrix.p.os == 'windows-latest'
        shell: cmd
        run: |
          python -m pip install packaging
          python mach bootstrap

      - name: "Bootstrap Environment (macOS & Linux)"
        if: matrix.p.os != 'windows-latest'
        run: |
          pip3 install packaging
          python3 ./mach bootstrap

      - name: "Compile Execution (Windows)"
        if: matrix.p.os == 'windows-latest'
        shell: cmd
        run: ${{ matrix.p.run }}

      - name: "Compile Execution (macOS & Linux)"
        if: matrix.p.os != 'windows-latest'
        run: ${{ matrix.p.run }}

      - name: "Process Resulting File Targets Layout"
        id: locate
        run: |
          if [ "${{ matrix.p.env }}" == "windows" ]; then
            echo "path=target/release/servo.exe" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "macos" ] || [ "${{ matrix.p.env }}" == "linux" ]; then
            echo "path=target/release/servo" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "ohos" ]; then
            echo "path=target/aarch64-unknown-linux-ohos/release/libservoshell.so" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "android" ]; then
            echo "path=target/aarch64-linux-android/release/libservo.so" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "ios" ]; then
            echo "path=target/universal/release/libservo.a" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: "Stage Artifact to Multi-Node Storage Caches"
        uses: actions/upload-artifact@v4
        with:
          name: srv-${{ matrix.p.env }}
          path: ${{ steps.locate.outputs.path }}

  publish-release:
    name: "Package & Deploy Finished Run Files"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "Initialize Packing Storage Hierarchy"
        run: |
          mkdir -p ./in ./out
          mkdir -p ./apk/lib/arm64-v8a
          mkdir -p ./hap/libs/arm64-v8a
          mkdir -p ./ios.app

      - name: "Download Staged Files from Pipeline Caches"
        uses: actions/download-artifact@v4
        with:
          path: ./in

      - name: "Package Windows Binary"
        run: cp ./in/srv-windows/servo.exe ./out/servo-windows-x64.exe || true

      - name: "Package macOS Binary"
        run: cp ./in/srv-macos/servo ./out/servo-mac-arm64 || true

      - name: "Package Linux Binary"
        run: cp ./in/srv-linux/servo ./out/servo-linux-x64 || true

      - name: "Package Android APK Container"
        run: |
          cp ./in/srv-android/libservo.so ./apk/lib/arm64-v8a/ || true
          cd apk && zip -r ../out/servo-android-deployment.apk ./* && cd ..

      - name: "Package OpenHarmony HAP Container"
        run: |
          cp ./in/srv-ohos/libservoshell.so ./hap/libs/arm64-v8a/ || true
          cd hap && zip -r ../out/servo-openharmony-app.hap ./* && cd ..

      - name: "Package iOS Bundle"
        run: |
          cp ./in/srv-ios/libservo.a ./ios.app/ || true
          zip -r ./out/servo-ios-bundle.app.zip ./ios.app

      - name: "Deploy Live Assets to Release Column"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: live-release-${{ github.run_number }}
          name: "Servo Engine Production Executables #${{ github.run_number }}"
          body: |
            Automated production build for all target environments.
          draft: false
          prerelease: false
          files: out/*
