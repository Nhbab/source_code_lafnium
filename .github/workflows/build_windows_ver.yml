name: Servo Mega Build (6 Platforms)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-code:
    name: Sync Upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, token: ${{ secrets.GITHUB_TOKEN }} }
      - name: Git Sync
        run: |
          git config --global --add safe.directory "*"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git remote add upstream https://github.com || true
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X ours -m "Sync" || echo "Done"
          git push origin HEAD:${{ github.ref_name }} || echo "Up to date"

  build:
    name: Build ${{ matrix.p.name }}
    needs: sync-code
    runs-on: ${{ matrix.p.os }}
    strategy:
      fail-fast: false
      matrix:
        p:
          - { name: "Win", os: "windows-latest", env: "windows", run: "python mach build --release" }
          - { name: "Mac", os: "macos-latest", env: "macos", run: "python3 ./mach build --release" }
          - { name: "Lin", os: "ubuntu-latest", env: "linux", run: "python3 ./mach build --release" }
          - { name: "Ohos", os: "ubuntu-latest", env: "ohos", run: "python3 ./mach build --release --target aarch64-unknown-linux-ohos" }
          - { name: "And", os: "ubuntu-latest", env: "android", run: "python3 ./mach build --release --android" }
          - { name: "iOS", os: "macos-latest", env: "ios", run: "python3 ./mach build --release --ios" }
    steps:
      - name: Disk Clean (Win)
        if: matrix.p.os == 'windows-latest'
        shell: powershell
        run: Remove-Item -Recurse -Force "C:\Program Files\Android","C:\Microsoft\AndroidNDK" -ErrorAction SilentlyContinue
      - name: Disk Clean (Unix)
        if: matrix.p.os != 'windows-latest'
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /Users/runner/Library/Android/sdk /opt/hostedtoolcache/CodeQL || true
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Tools (Win)
        if: matrix.p.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2
      - name: Tools (Mac)
        if: matrix.p.os == 'macos-latest'
        run: brew install automake pkg-config cmake ninja autoconf
      - name: Tools (Lin)
        if: matrix.p.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y git curl python3-pip libx11-dev libgl1-mesa-dev libosmesa6-dev libfontconfig1-dev libssl-dev pkg-config
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Py Deps
        run: pip install uv packaging
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: 'x86_64-pc-windows-msvc aarch64-unknown-linux-ohos aarch64-linux-android armv7-linux-androideabi aarch64-apple-ios x86_64-apple-ios' }
      - uses: swatinem/rust-cache@v2
        with: { shared-key: "servo-${{ matrix.p.env }}" }
      - name: OHOS SDK
        if: matrix.p.env == 'ohos'
        run: |
          mkdir -p $HOME/ohos-sdk && curl -L -o ohos.tgz https://harmonyos.com
          tar -xzf ohos.tgz -C $HOME/ohos-sdk && echo "OHOS_SDK_NATIVE=$(find $HOME/ohos-sdk -type d -name "native" | head -n 1)" >> $GITHUB_ENV
      - name: NDK SDK
        if: matrix.p.env == 'android'
        uses: nttld/setup-ndk@v1
        with: { ndk-version: r26b }
      - name: Bootstrap
        run: |
          python -m pip install packaging || pip3 install packaging
          python mach bootstrap || python3 ./mach bootstrap
        shell: ${{ matrix.p.os == 'windows-latest' && 'cmd' || 'bash' }}
      - name: Compile
        run: ${{ matrix.p.run }}
        shell: ${{ matrix.p.os == 'windows-latest' && 'cmd' || 'bash' }}
      - name: Pathing
        id: locate
        run: |
          if [ "${{ matrix.p.env }}" == "windows" ]; then echo "path=target/release/servo.exe" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "macos" ] || [ "${{ matrix.p.env }}" == "linux" ]; then echo "path=target/release/servo" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "ohos" ]; then echo "path=target/aarch64-unknown-linux-ohos/release/libservoshell.so" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "android" ]; then echo "path=target/aarch64-linux-android/release/libservo.so" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.p.env }}" == "ios" ]; then echo "path=target/universal/release/libservo.a" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with: { name: "srv-${{ matrix.p.env }}", path: "${{ steps.locate.outputs.path }}" }

  publish-release:
    name: Deploy App Containers
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: mkdir -p ./in ./out ./apk/lib/arm64-v8a ./hap/libs/arm64-v8a ./ios.app
      - uses: actions/download-artifact@v4
        with: { path: ./in }
      - name: Package Executables
        run: |
          cp ./in/srv-windows/servo.exe ./out/servo-win.exe || true
          cp ./in/srv-macos/servo ./out/servo-mac || true
          cp ./in/srv-linux/servo ./out/servo-lin || true
          cp ./in/srv-android/libservo.so ./apk/lib/arm64-v8a/ && cd apk && zip -r ../out/servo-android.apk ./* && cd .. || true
          cp ./in/srv-ohos/libservoshell.so ./hap/libs/arm64-v8a/ && cd hap && zip -r ../out/servo-ohos.hap ./* && cd .. || true
          cp ./in/srv-ios/libservo.a ./ios.app/ && zip -r ./out/servo-ios.app.zip ./ios.app || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: live-${{ github.run_number }}
          name: Servo Build #${{ github.run_number }}
          files: out/*
          cp ./in/srv-windows/servo.exe ./out/servo-win.exe || true
          cp ./in/srv-macos/servo ./out/servo-mac || true
          cp ./in/srv-linux/servo ./out/servo-lin || true
          cp ./in/srv-android/libservo.so ./apk/lib/arm64-v8a/ && cd apk && zip -r ../out/servo-android.apk ./* && cd .. || true
          cp ./in/srv-ohos/libservoshell.so ./hap/libs/arm64-v8a/ && cd hap && zip -r ../out/servo-ohos.hap ./* && cd .. || true
          cp ./in/srv-ios/libservo.a ./ios.app/ && zip -r ./out/servo-ios.app.zip ./ios.app || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: live-${{ github.run_number }}
          name: Servo Build #${{ github.run_number }}
          files: out/*
